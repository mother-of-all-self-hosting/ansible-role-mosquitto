---
- name: (Deprecation) Catch and report renamed settings
  ansible.builtin.fail:
    msg: >-
      Your configuration contains a variable, which now has a different name.
      Please change your configuration to rename the variable (`{{ item.old }}` -> `{{ item.new }}`).
  when: "lookup('ansible.builtin.varnames', ('^' + item.old + '$'), wantlist=True) | length > 0"
  with_items:
    - { "old": "mosquitto_container_mqtt_host_bind_port", "new": "mosquitto_container_tcp_host_bind_port" }
    - { "old": "mosquitto_container_mqtt_port", "new": "mosquitto_container_tcp_port" }

- name: Fail if required Mosquitto settings not defined
  ansible.builtin.fail:
    msg: >-
      You need to define a required configuration setting (`{{ item.name }}`).
  when: "item.when | bool and lookup('vars', item.name, default='') | string | length == 0"
  with_items:
    - { "name": "mosquitto_uid", when: true }
    - { "name": "mosquitto_gid", when: true }
    - { "name": "mosquitto_hostname", when: "{{ mosquitto_container_labels_traefik_tcp_enabled }}" }
    - { "name": "mosquitto_container_network", when: true }

- name: Run if Traefik is enabled
  when: mosquitto_container_labels_traefik_tcp_enabled | bool
  block:
    - name: Fail if Traefik settings required for Mosquitto are not defined
      ansible.builtin.fail:
        msg: >-
          You need to define a required configuration setting (`{{ item }}`).
      when: "lookup('vars', item, default='') | string | length == 0"
      with_items:
        - mosquitto_container_labels_traefik_tcp_hostname
